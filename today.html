<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오늘 브리핑">
<title>오늘 브리핑</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f3;--card:#fff;--text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a09e;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --r:16px;--rs:10px;
  --good:#1a9e75;--norm:#2a7fd4;--bad:#c07a10;--vbad:#b03030;
  --acc:#3a7bd5;--acc2:#e8f0fe;
  --wbg:#fff8ed;--wbd:#f5d48a;--wtx:#8a5a00;
  --pbg:#f0f7ff;--pbd:#c5ddf7;--ptx:#1a4a8a;
  --tbg:#f0fff8;--tbd:#b8e8d4;--ttx:#0d5c3a;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--card:#1c1c1a;--text:#f0f0ee;--text2:#9a9a97;--text3:#636360;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --acc2:#1a2a4a;--wbg:#231900;--wbd:#6a4500;--wtx:#f0b850;
  --pbg:#0d1f35;--pbd:#1e4a7a;--ptx:#7ab8f0;
  --tbg:#0d2518;--tbd:#1a5c3a;--ttx:#6adba8;
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:3rem}
.st{height:max(env(safe-area-inset-top,0px),16px)}
.hdr{padding:.6rem 1.1rem .9rem;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-.4px}
.dline{font-size:13px;color:var(--text2);margin-top:3px}
.lline{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px}
.hright{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.btn{background:var(--card);border:.5px solid var(--border2);border-radius:var(--rs);padding:7px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit}
.btn:active{opacity:.6;transform:scale(.96)}

/* 탭 */
.tabs{display:flex;gap:6px;padding:0 1.1rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--card);border:.5px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.tab:active{opacity:.6}

/* 섹션 */
.sec{padding:0 1.1rem;margin-bottom:1rem}
.slbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;margin-bottom:8px}
.card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}

/* 오늘 날씨 */
.tgrid{display:grid;grid-template-columns:1fr 1fr 1fr}
.tcell{padding:.9rem .7rem;border-right:.5px solid var(--border);text-align:center}
.tcell:last-child{border-right:none}
.tlbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.tval{font-size:24px;font-weight:300;letter-spacing:-1px}
.tval sup{font-size:12px;font-weight:400}
.tsub{font-size:10px;color:var(--text3);margin-top:2px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 1.1rem;border-top:.5px solid var(--border);font-size:14px}
.ikey{color:var(--text2)}
.ival{font-weight:500;display:flex;align-items:center;gap:5px}
.wemo{font-size:18px}
.dwrap{border-top:.5px solid var(--border);padding:10px 1.1rem 12px}
.dlbl{font-size:11px;color:var(--text3);margin-bottom:8px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.dchip{background:var(--bg);border-radius:var(--rs);padding:9px 4px;text-align:center}
.dtime{font-size:11px;color:var(--text3);margin-bottom:3px}
.dval{font-size:13px;font-weight:600}
.good{color:var(--good)}.norm{color:var(--norm)}.bad{color:var(--bad)}.vbad{color:var(--vbad)}

/* 포인트 카드 */
.point-card{border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.7}
.point-card.today{background:var(--pbg);border:.5px solid var(--pbd);color:var(--ptx)}
.point-card.tomorrow{background:var(--tbg);border:.5px solid var(--tbd);color:var(--ttx)}
.point-title{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:6px;opacity:.7}
.point-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px}
.point-item:last-child{margin-bottom:0}
.point-dot{flex-shrink:0;margin-top:2px}

/* 일정 */
.dheader{padding:10px 1.1rem 6px;font-size:12px;font-weight:600;color:var(--text2);background:var(--bg);border-bottom:.5px solid var(--border)}
.dheader.dtoday{color:var(--acc)}
.calgroup{padding:8px 1.1rem 8px;border-bottom:.5px solid var(--border)}
.calgroup:last-child{border-bottom:none}
.calname{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.sitem{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
.stime2{font-size:12px;color:var(--acc);font-weight:600;min-width:42px;flex-shrink:0;padding-top:1px}
.sinfo{display:flex;flex-direction:column;gap:2px}
.stitle{font-size:14px;font-weight:500;color:var(--text)}
.sdesc{font-size:11px;color:var(--text3)}
.sempty{padding:1.5rem;text-align:center;font-size:13px;color:var(--text3)}

/* 주간 표 */
.wtable{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.wt-row{display:grid}
.wt-cell{border-right:.5px solid var(--border);border-top:.5px solid var(--border);min-width:0;overflow:hidden}
.wt-cell:last-child{border-right:none}
.wt-row:first-child .wt-cell{border-top:none}
/* 헤더행 */
.wt-hrow{background:var(--bg)}
.wt-hcell{padding:7px 3px;text-align:center}
.wt-dow{font-size:11px;font-weight:600;color:var(--text2)}
.wt-date{font-size:10px;color:var(--text3);margin-top:1px}
.wt-today .wt-dow,.wt-today .wt-date{color:var(--acc)}
/* 날씨행 */
.wt-wcell{padding:8px 3px;text-align:center}
.wt-emo{font-size:15px;line-height:1.2}
.wt-temps{display:flex;justify-content:center;gap:4px;margin-top:2px}
.wt-hi{font-size:11px;font-weight:700;color:#e05a00}
.wt-lo{font-size:11px;font-weight:600;color:#2a7fd4}
.wt-pop{font-size:10px;color:var(--norm);margin-top:1px}
.wt-alert{font-size:9px;color:#b03030;font-weight:700;margin-bottom:2px}
.wt-sitem{margin-bottom:3px;display:flex;align-items:baseline;gap:3px;flex-wrap:nowrap}
.wt-sitem:last-child{margin-bottom:0}
.wt-stime{font-size:10px;font-weight:700;color:var(--acc);flex-shrink:0}
.wt-stitle{font-size:10px;color:var(--text);line-height:1.3;word-break:keep-all}
/* 일정행 */
.wt-scell{padding:6px 4px;vertical-align:top;border-top:.5px solid var(--border)}
.wt-calname{font-size:9px;color:var(--text3);margin-bottom:2px;font-weight:600}
.wt-sitem{margin-bottom:3px}
.wt-sitem:last-child{margin-bottom:0}
.wt-stime{display:block;font-size:9px;color:var(--acc);font-weight:600}
.wt-stitle{display:block;font-size:10px;color:var(--text);line-height:1.3;word-break:keep-all}
.wt-empty{font-size:11px;color:var(--border2);text-align:center;padding:4px 0}

.links-row{display:flex;gap:6px;padding:0 1.1rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.links-row::-webkit-scrollbar{display:none}
.link-btn{background:var(--card);border:.5px solid var(--border2);border-radius:var(--rs);padding:7px 12px;font-size:12px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.link-btn:active{opacity:.6}
.notice{display:flex;align-items:flex-start;gap:8px;background:var(--wbg);border:.5px solid var(--wbd);border-radius:var(--rs);padding:11px 13px;font-size:13px;color:var(--wtx);line-height:1.55}
.gcal-bar{padding:0 1.1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.gcal-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.gcal-btn{background:#4285f4;color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.gcal-btn:active{opacity:.8}
.gcal-btn.out{background:var(--card);color:var(--text2);border:.5px solid var(--border2)}
.loading{padding:2rem;text-align:center;color:var(--text3);font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--text3);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fff0f0;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:#b03030;line-height:1.5}
@media(prefers-color-scheme:dark){.err{background:#2a0d0d;color:#e07070}}
.upd{font-size:11px;color:var(--text3);text-align:right;margin-top:5px}

/* 검색 오버레이 */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.ovl.open{display:flex}
.ssheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:1.2rem 1.2rem calc(1.5rem + env(safe-area-inset-bottom,0px));max-height:80vh;overflow-y:auto}
.shandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1rem}
.stit{font-size:16px;font-weight:600;margin-bottom:12px}
.siwrap{position:relative}
.sinput{width:100%;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--rs);padding:11px 40px 11px 14px;font-size:15px;color:var(--text);font-family:inherit;outline:none}
.sinput:focus{border-color:var(--text3)}
.sclr{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1;display:none}
.sres{margin-top:10px}
.ritem{padding:12px 4px;border-bottom:.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--text)}
.ritem:last-child{border-bottom:none}
.ritem:active{opacity:.6}
.rsub{font-size:12px;color:var(--text3);margin-top:2px}
.shint{font-size:13px;color:var(--text3);padding:1rem 0;text-align:center}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="st"></div>
<div class="hdr">
  <div>
    <h1>오늘 브리핑</h1>
    <div class="dline" id="dlbl"></div>
    <div class="lline">📍 <span id="locname">위치 확인 중...</span></div>
  </div>
  <div class="hright">
    <button class="btn" onclick="init()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
    <button class="btn" onclick="openSearch()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      지역 검색
    </button>
  </div>
</div>

<div class="gcal-bar">
  <div class="gcal-status" id="gcalStatus">📅 캘린더 미연결</div>
  <button class="gcal-btn" id="gcalBtn" onclick="gcalLogin()">Google 캘린더 연결</button>
</div>

<div class="tabs">
  <button class="tab on" onclick="setTab('today',this)">오늘</button>
  <button class="tab" onclick="setTab('week',this)">일주일</button>
  <button class="tab" onclick="setTab('two',this)">2주일</button>
  <button class="tab" onclick="setTab('ulju',this)">📍 울주군</button>
</div>

<div class="links-row">
  <a class="link-btn" href="https://calendar.google.com" target="_blank">
    <span>📅</span> Google 캘린더
  </a>
  <a class="link-btn" href="https://www.weather.go.kr" target="_blank">
    <span>🌤</span> 기상청
  </a>
  <a class="link-btn" href="https://www.airkorea.or.kr" target="_blank">
    <span>💨</span> 에어코리아
  </a>
</div>

<div id="mainArea"></div>

<div class="ovl" id="ovl" onclick="ovlClick(event)">
  <div class="ssheet">
    <div class="shandle"></div>
    <div class="stit">지역 검색</div>
    <div class="siwrap">
      <input class="sinput" id="sinput" type="text" placeholder="국내외 도시명 입력 (예: 수원, Tokyo, Paris)" oninput="onSInput()" autocomplete="off"/>
      <button class="sclr" id="sclr" onclick="clrSearch()">×</button>
    </div>
    <div class="sres" id="sres"><div class="shint">국내외 도시명을 입력하세요</div></div>
  </div>
</div>

<script>
var KMA='4a288461c81a5030d7a2bfd0877c6ef6974a30f9f675cda526931f42b0c0c24f';
var GCAL_CLIENT_ID='928870757670-fe1973vkmlfj0kbcb3kkomvrhtjr42s2.apps.googleusercontent.com';
var GCAL_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
var gcalToken=null;
var DAYS=['일','월','화','수','목','금','토'];
var SKYMAP={'1':'맑음','3':'구름많음','4':'흐림'};
var PTYMAP={'0':'','1':'비','2':'비/눈','3':'눈','4':'소나기'};
var EMOJIS={'맑음':'☀️','구름많음':'⛅','흐림':'☁️','비':'🌧️','소나기':'🌦️','눈':'❄️','비/눈':'🌨️','안개':'🌫️','뇌우':'⛈️','이슬비':'🌦️','우박':'🌨️'};

var nx=55,ny=124,lat=37.4563,lng=126.7052,locName='인천',isKR=true;
var curTab='today';
var wCache={};
var stimer=null;
var todayWData=null; // 오늘 날씨 캐시 (포인트용)

function p2(n){return String(n).padStart(2,'0')}
function dateStr(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function todayYMD(d){return ''+d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())}

function setDate(){
  var n=new Date();
  document.getElementById('dlbl').textContent=n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+DAYS[n.getDay()]+')';
}

function baseDT(now){
  var h=now.getHours();
  if(h<2){var p=new Date(+now-86400000);return{d:todayYMD(p),t:'2300'}}
  for(var i=0,ts=[23,20,17,14,11,8,5,2];i<ts.length;i++){if(h>=ts[i])return{d:todayYMD(now),t:p2(ts[i])+'00'}}
  return{d:todayYMD(now),t:'0200'}
}

function dustGrd(v){
  if(!v)return{l:'정보없음',c:'norm'};
  if(v.indexOf('좋음')>=0)return{l:'좋음',c:'good'};
  if(v.indexOf('매우')>=0)return{l:'매우나쁨',c:'vbad'};
  if(v.indexOf('나쁨')>=0)return{l:'나쁨',c:'bad'};
  if(v.indexOf('보통')>=0)return{l:'보통',c:'norm'};
  return{l:v,c:'norm'}
}

function ll2grid(la,lo){
  var RE=6371.00877,G=5,S1=30,S2=60,OL=126,OA=38,XO=43,YO=136,D=Math.PI/180;
  var re=RE/G,s1=S1*D,s2=S2*D,ol=OA*D;
  var sn=Math.log(Math.cos(s1)/Math.cos(s2))/Math.log(Math.tan(Math.PI*.25+s2*.5)/Math.tan(Math.PI*.25+s1*.5));
  var sf=Math.pow(Math.tan(Math.PI*.25+s1*.5),sn)*Math.cos(s1)/sn;
  var ro=re*sf/Math.pow(Math.tan(Math.PI*.25+ol*.5),sn);
  var ra=re*sf/Math.pow(Math.tan(Math.PI*.25+la*D*.5),sn);
  var th=(lo-OL)*D*sn;
  return{nx:Math.floor(ra*Math.sin(th)+XO+0.5),ny:Math.floor(ro-ra*Math.cos(th)+YO+0.5)}
}

function wmoDesc(c){
  if(c===0)return'맑음';if(c<=2)return'구름많음';if(c<=3)return'흐림';
  if(c<=49)return'안개';if(c<=59)return'이슬비';if(c<=69)return'비';
  if(c<=79)return'눈';if(c<=82)return'소나기';if(c<=84)return'우박';if(c<=99)return'뇌우';
  return'흐림'
}

function emo(desc){return EMOJIS[desc]||'🌡️'}

// ── 기상청 오늘 ──
async function kmaToday(){
  var now=new Date(),bt=baseDT(now),td=todayYMD(now);
  var prev=new Date(+now-86400000),pd=todayYMD(prev);
  var [r1,r2,r3,r4]=await Promise.all([
    fetch('https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey='+KMA+'&pageNo=1&numOfRows=300&dataType=JSON&base_date='+bt.d+'&base_time='+bt.t+'&nx='+nx+'&ny='+ny),
    fetch('https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey='+KMA+'&pageNo=1&numOfRows=300&dataType=JSON&base_date='+td+'&base_time=0200&nx='+nx+'&ny='+ny),
    fetch('https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMinuDustFrcstDspth?serviceKey='+KMA+'&returnType=json&numOfRows=50&pageNo=1&searchDate='+td.slice(0,4)+'-'+td.slice(4,6)+'-'+td.slice(6,8)+'&InformCode=PM25'),
    fetch('https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey='+KMA+'&pageNo=1&numOfRows=300&dataType=JSON&base_date='+pd+'&base_time=0200&nx='+nx+'&ny='+ny)
  ]);
  var [j1,j2,j3,j4]=await Promise.all([r1.json(),r2.json(),r3.json(),r4.json()]);

  var d={};
  var all=[].concat(
    j1.response&&j1.response.body&&j1.response.body.items?j1.response.body.items.item:[],
    j2.response&&j2.response.body&&j2.response.body.items?j2.response.body.items.item:[]
  );
  for(var i=0;i<all.length;i++){
    var it=all[i];
    if(!d[it.fcstDate])d[it.fcstDate]={};
    if(!d[it.fcstDate][it.fcstTime])d[it.fcstDate][it.fcstTime]={};
    if(!d[it.fcstDate][it.fcstTime][it.category])d[it.fcstDate][it.fcstTime][it.category]=it.fcstValue;
  }

  var tdata=d[td]||{}, times=Object.keys(tdata);
  var TMX=null,TMN=null,POP=0;
  for(var i=0;i<times.length;i++){
    var t=times[i];
    if(tdata[t].TMX&&TMX===null)TMX=Math.round(parseFloat(tdata[t].TMX));
    if(tdata[t].TMN&&TMN===null)TMN=Math.round(parseFloat(tdata[t].TMN));
    if(tdata[t].POP!==undefined)POP=Math.max(POP,parseInt(tdata[t].POP));
  }
  var noon=tdata['1200']||tdata['1300']||tdata['1100']||tdata[times[0]]||{};
  var sky=PTYMAP[noon.PTY]||SKYMAP[noon.SKY]||'-';

  // 내일
  var tmrDate=new Date(+now+86400000),tmrYMD=todayYMD(tmrDate);
  var tmrData=d[tmrYMD]||{},tmrTimes=Object.keys(tmrData);
  var tmrTMX=null,tmrTMN=null,tmrPOP=0;
  for(var i=0;i<tmrTimes.length;i++){
    var t=tmrTimes[i];
    if(tmrData[t].TMX&&tmrTMX===null)tmrTMX=Math.round(parseFloat(tmrData[t].TMX));
    if(tmrData[t].TMN&&tmrTMN===null)tmrTMN=Math.round(parseFloat(tmrData[t].TMN));
    if(tmrData[t].POP!==undefined)tmrPOP=Math.max(tmrPOP,parseInt(tmrData[t].POP));
  }
  var tmrNoon=tmrData['1200']||tmrData['1300']||tmrData['1100']||tmrData[tmrTimes[0]]||{};
  var tmrSky=PTYMAP[tmrNoon.PTY]||SKYMAP[tmrNoon.SKY]||'-';

  // 어제
  var yd={},yi=j4.response&&j4.response.body&&j4.response.body.items?j4.response.body.items.item:[];
  for(var i=0;i<yi.length;i++){var it=yi[i];if(it.fcstDate!==pd)continue;if(!yd[it.category])yd[it.category]=it.fcstValue}
  var yTMX=yd.TMX?Math.round(parseFloat(yd.TMX)):'-';
  var yTMN=yd.TMN?Math.round(parseFloat(yd.TMN)):'-';

  // 미세먼지
  var di=j3.response&&j3.response.body&&j3.response.body.items?j3.response.body.items:[];
  var slots={오전:null,오후:null,저녁:null};
  for(var i=0;i<di.length;i++){
    var item=di[i],g=item.informGrade||'',dt=item.dataTime||'';
    var m=g.match(/인천\s*:\s*([^\s,]+)/);
    if(m){
      if(dt.indexOf('05시')>=0&&!slots['오전'])slots['오전']=m[1];
      else if(dt.indexOf('11시')>=0&&!slots['오후'])slots['오후']=m[1];
      else if(dt.indexOf('17시')>=0&&!slots['저녁'])slots['저녁']=m[1];
    }
  }
  return{TMX:TMX,TMN:TMN,yTMX:yTMX,yTMN:yTMN,POP:POP,sky:sky,slots:slots,
    tmrTMX:tmrTMX,tmrTMN:tmrTMN,tmrPOP:tmrPOP,tmrSky:tmrSky,
    tdStr:dateStr(now),tmrStr:dateStr(tmrDate)}
}

function makePoints(wdata){
  var now=new Date();
  var tdStr=dateStr(now),tmrStr=dateStr(new Date(+now+86400000));
  var tdScheds=SCHEDS.filter(function(s){return s.date===tdStr});
  var tmrScheds=SCHEDS.filter(function(s){return s.date===tmrStr});

  // 오늘 포인트
  var todayItems=[];
  if(wdata){
    var skyDesc=wdata.sky||'-';
    var pop=wdata.POP||0;
    var dustMorning=wdata.slots&&wdata.slots['오전']?wdata.slots['오전']:'';
    todayItems.push(emo(skyDesc)+' '+skyDesc+(wdata.TMX!==null?' · 최고 '+wdata.TMX+'°':'')+(pop>=30?' · 강수 '+pop+'%':''));
    if(dustMorning&&dustMorning!=='보통'&&dustMorning!=='좋음')todayItems.push('😷 미세먼지 오전 '+dustMorning+' · 마스크 챙기세요');
    if(pop>=30)todayItems.push('☂️ 강수확률 '+pop+'% · 우산 챙기세요');
  }
  if(tdScheds.length){
    var firstSched=tdScheds[0];
    todayItems.push('📅 '+firstSched.cal+' '+firstSched.time+' '+firstSched.title);
    if(tdScheds.length>1)todayItems.push('📅 외 '+( tdScheds.length-1)+'개 일정 있음');
  } else {
    todayItems.push('📅 오늘 일정 없음');
  }

  // 내일 포인트
  var tmrItems=[];
  if(wdata){
    var tmrSky=wdata.tmrSky||'-';
    var tmrPop=wdata.tmrPOP||0;
    tmrItems.push(emo(tmrSky)+' '+tmrSky+(wdata.tmrTMX!==null?' · 최고 '+wdata.tmrTMX+'°':'')+(tmrPop>=30?' · 강수 '+tmrPop+'%':''));
    if(tmrPop>=30)tmrItems.push('☂️ 강수확률 '+tmrPop+'% · 내일 우산 미리 챙기기');
  }
  if(tmrScheds.length){
    for(var i=0;i<Math.min(tmrScheds.length,3);i++){
      var s=tmrScheds[i];
      tmrItems.push('📅 '+s.cal+' '+s.time+' '+s.title);
    }
    if(tmrScheds.length>3)tmrItems.push('📅 외 '+(tmrScheds.length-3)+'개 일정');
  } else {
    tmrItems.push('📅 내일 일정 없음');
  }

  var todayHtml=todayItems.map(function(t){return'<div class="point-item"><span class="point-dot"></span>'+t+'</div>'}).join('');
  var tmrHtml=tmrItems.map(function(t){return'<div class="point-item"><span class="point-dot"></span>'+t+'</div>'}).join('');

  return '<div class="sec">'+
    '<div class="point-card today"><div class="point-title">💡 오늘 포인트</div>'+todayHtml+'</div>'+
    '<div class="point-card tomorrow"><div class="point-title">🌅 내일 포인트</div>'+tmrHtml+'</div>'+
    '</div>'
}

// ── 주간 표 렌더 ──
function renderWeekTable(wdata,days){
  if(!wdata||!wdata.daily)return'<div class="sec"><div class="err">날씨 데이터 없음</div></div>';
  var d=wdata.daily,today=new Date();today.setHours(0,0,0,0);
  var cnt=Math.min(days,d.time.length);
  var lbl=days<=7?'일주일':'2주일';
  var html='<div class="sec"><div class="slbl">'+lbl+' · '+locName+'</div>';

  for(var w=0;w<cnt;w+=7){
    var week=[];
    for(var i=w;i<Math.min(w+7,cnt);i++){
      var dt=new Date(d.time[i]+'T00:00:00');
      var isT=dt.getTime()===today.getTime();
      var desc=wmoDesc(d.weathercode[i]);
      var pop=d.precipitation_probability_max[i]||0;
      var dstr=d.time[i];
      var dayScheds=SCHEDS.filter(function(s){return s.date===dstr});
      week.push({dt:dt,isT:isT,desc:desc,pop:pop,
        hi:Math.round(d.temperature_2m_max[i]),lo:Math.round(d.temperature_2m_min[i]),
        scheds:dayScheds,dstr:dstr})
    }
    var cols=week.length;
    var gridStyle='grid-template-columns:repeat('+cols+',1fr)';

    html+='<div class="wtable" style="margin-bottom:'+(w+7<cnt?'12px':'0')+'">';

    // 헤더행
    html+='<div class="wt-row wt-hrow" style="'+gridStyle+'">';
    for(var j=0;j<week.length;j++){
      var day=week[j];
      html+='<div class="wt-cell wt-hcell'+(day.isT?' wt-today':'')+'">'+
        '<div class="wt-dow">'+(day.isT?'오늘':DAYS[day.dt.getDay()])+'</div>'+
        '<div class="wt-date">'+(day.dt.getMonth()+1)+'/'+(day.dt.getDate())+'</div>'+
        '</div>'
    }
    html+='</div>';

    // 날씨행
    html+='<div class="wt-row" style="'+gridStyle+'">';
    for(var j=0;j<week.length;j++){
      var day=week[j];
      // 큰 이벤트 감지 (태풍/폭설/폭우/강풍)
      var bigEvent='';
      if(day.desc==='뇌우')bigEvent='⚠️폭풍';
      else if(day.desc==='눈'&&day.lo<=-5)bigEvent='⚠️폭설';
      else if(day.pop>=80&&day.desc==='비')bigEvent='⚠️폭우';
      html+='<div class="wt-cell wt-wcell'+(day.isT?' wt-today':'')+'">'+
        (bigEvent?'<div class="wt-alert">'+bigEvent+'</div>':'')+
        '<div class="wt-emo">'+emo(day.desc)+'</div>'+
        '<div class="wt-temps">'+
          '<span class="wt-hi">'+day.hi+'°</span>'+
          '<span class="wt-lo">'+day.lo+'°</span>'+
        '</div>'+
        (day.pop>0?'<div class="wt-pop">💧'+day.pop+'%</div>':'')+
        '</div>'
    }
    html+='</div>';

    // 일정행
    html+='<div class="wt-row" style="'+gridStyle+'">';
    for(var j=0;j<week.length;j++){
      var day=week[j];
      if(!day.scheds.length){
        html+='<div class="wt-cell wt-scell'+(day.isT?' wt-today':'')+'"><div class="wt-empty">-</div></div>';
        continue
      }
      // 캘린더별 그룹
      var cg={},co=[];
      for(var k=0;k<day.scheds.length;k++){
        var s=day.scheds[k];
        if(!cg[s.cal]){cg[s.cal]=[];co.push(s.cal)}
        cg[s.cal].push(s)
      }
      var cellHtml='';
      for(var k=0;k<co.length;k++){
        var cal=co[k],list=cg[cal];
        cellHtml+='<div class="wt-calname">'+cal+'</div>';
        for(var m=0;m<list.length;m++){
          var s=list[m];
          cellHtml+='<div class="wt-sitem"><span class="wt-stime">'+s.time+'</span> <span class="wt-stitle">'+s.title+'</span></div>'
        }
      }
      html+='<div class="wt-cell wt-scell'+(day.isT?' wt-today':'')+'">'+cellHtml+'</div>'
    }
    html+='</div>';
    html+='</div>' // wtable
  }
  html+='</div>';
  return html
}

function gcalLogin(){
  if(gcalToken){gcalLogout();return}
  var client=google.accounts.oauth2.initTokenClient({
    client_id:GCAL_CLIENT_ID,
    scope:GCAL_SCOPE,
    callback:function(resp){
      if(resp.error)return;
      gcalToken=resp.access_token;
      localStorage.setItem('gcal_token',gcalToken);
      updateGcalUI(true);
      fetchGcalEvents().then(function(){renderMain()})
    }
  });
  client.requestAccessToken()
}

function gcalLogout(){
  gcalToken=null;
  localStorage.removeItem('gcal_token');
  SCHEDS=[];
  updateGcalUI(false);
  renderMain()
}

function updateGcalUI(loggedIn){
  var btn=document.getElementById('gcalBtn');
  var status=document.getElementById('gcalStatus');
  if(loggedIn){
    btn.textContent='연결 해제';btn.classList.add('out');
    status.textContent='✅ Google 캘린더 연결됨'
  } else {
    btn.textContent='Google 캘린더 연결';btn.classList.remove('out');
    status.textContent='📅 캘린더 미연결'
  }
}

async function fetchGcalEvents(){
  if(!gcalToken)return;
  try{
    var now=new Date();
    var tMin=new Date(now);tMin.setHours(0,0,0,0);
    var tMax=new Date(now);tMax.setDate(tMax.getDate()+14);tMax.setHours(23,59,59,999);

    // 캘린더 목록 가져오기
    var calRes=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{
      headers:{Authorization:'Bearer '+gcalToken}
    });
    var calData=await calRes.json();
    var calendars=calData.items||[];

    var allEvents=[];
    // 각 캘린더에서 이벤트 가져오기
    for(var i=0;i<calendars.length;i++){
      var cal=calendars[i];
      if(cal.accessRole==='freeBusyReader')continue;
      var evRes=await fetch(
        'https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(cal.id)+'/events'+
        '?timeMin='+tMin.toISOString()+'&timeMax='+tMax.toISOString()+
        '&singleEvents=true&orderBy=startTime&maxResults=50',
        {headers:{Authorization:'Bearer '+gcalToken}}
      );
      var evData=await evRes.json();
      var events=evData.items||[];
      for(var j=0;j<events.length;j++){
        var ev=events[j];
        if(ev.status==='cancelled')continue;
        var startDate='',startTime='종일';
        if(ev.start.dateTime){
          var sd=new Date(ev.start.dateTime);
          startDate=dateStr(sd);
          startTime=p2(sd.getHours())+':'+p2(sd.getMinutes());
        } else if(ev.start.date){
          startDate=ev.start.date;
        }
        allEvents.push({
          date:startDate,
          cal:cal.summary||'캘린더',
          title:ev.summary||'(제목없음)',
          time:startTime,
          desc:ev.description||''
        })
      }
    }
    // 날짜순 정렬
    allEvents.sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time)});
    SCHEDS=allEvents;
    console.log('캘린더 이벤트 로드 완료:',SCHEDS.length+'개')
  }catch(e){
    console.error('캘린더 로드 실패:',e)
  }
}

      var t=times[i];

      if(d[t].TMN&&TMN===null)TMN=Math.round(parseFloat(d[t].TMN));
      if(d[t].POP!==undefined)POP=Math.max(POP,parseInt(d[t].POP));
    }
    var noon=d['1200']||d['1300']||d['1100']||d[times[0]]||{};
    var sky=PTYMAP[noon.PTY]||SKYMAP[noon.SKY]||'-';

    // 어제
    var yd={},yi=j4.response&&j4.response.body&&j4.response.body.items?j4.response.body.items.item:[];
    for(var i=0;i<yi.length;i++){var it=yi[i];if(it.fcstDate!==pd)continue;if(!yd[it.category])yd[it.category]=it.fcstValue}
    var yTMX=yd.TMX?Math.round(parseFloat(yd.TMX)):'-';
    var yTMN=yd.TMN?Math.round(parseFloat(yd.TMN)):'-';

    // 주간 (Open-Meteo)
    var omRes=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+uLat+'&longitude='+uLng+'&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=7');
    var omData=await omRes.json();

    var n=new Date();
    var html='<div class="sec"><div class="slbl">📍 울주군 오늘 날씨</div><div class="card">'+
      '<div class="tgrid">'+
      '<div class="tcell"><div class="tlbl">최고기온</div><div class="tval" style="color:#e05a00;font-weight:600">'+(TMX!==null?TMX:'-')+'<sup>°</sup></div><div class="tsub">어제 '+yTMX+'°</div></div>'+
      '<div class="tcell"><div class="tlbl">최저기온</div><div class="tval" style="color:#2a7fd4;font-weight:600">'+(TMN!==null?TMN:'-')+'<sup>°</sup></div><div class="tsub">어제 '+yTMN+'°</div></div>'+
      '<div class="tcell"><div class="tlbl">강수확률</div><div class="tval">'+POP+'<sup>%</sup></div></div>'+
      '</div>'+
      '<div class="irow"><span class="ikey">날씨</span><span class="ival"><span class="wemo">'+emo(sky)+'</span>'+sky+'</span></div>'+
      '</div><div class="upd">'+p2(n.getHours())+':'+p2(n.getMinutes())+' 기준</div></div>';

    // 일주일 표
    html+=renderWeekTableForLoc(omData,7,'울주군');
    area.innerHTML=html
  }catch(e){
    area.innerHTML='<div class="sec"><div class="err">울주군 날씨 로딩 실패: '+e.message+'</div></div>'
  }
}

// 특정 지역 주간 표 (일정 없이 날씨만)
function renderWeekTableForLoc(wdata,days,locLbl){
  if(!wdata||!wdata.daily)return'';
  var d=wdata.daily,today=new Date();today.setHours(0,0,0,0);
  var cnt=Math.min(days,d.time.length);
  var html='<div class="sec"><div class="slbl">📅 울주군 일주일 날씨</div><div class="wtable">';
  var gridStyle='grid-template-columns:repeat('+cnt+',1fr)';

  // 헤더
  html+='<div class="wt-row wt-hrow" style="'+gridStyle+'">';
  for(var i=0;i<cnt;i++){
    var dt=new Date(d.time[i]+'T00:00:00'),isT=dt.getTime()===today.getTime();
    html+='<div class="wt-cell wt-hcell'+(isT?' wt-today':'')+'">'+
      '<div class="wt-dow">'+(isT?'오늘':DAYS[dt.getDay()])+'</div>'+
      '<div class="wt-date">'+(dt.getMonth()+1)+'/'+(dt.getDate())+'</div>'+
      '</div>'
  }
  html+='</div>';

  // 날씨
  html+='<div class="wt-row" style="'+gridStyle+'">';
  for(var i=0;i<cnt;i++){
    var dt=new Date(d.time[i]+'T00:00:00'),isT=dt.getTime()===today.getTime();
    var desc=wmoDesc(d.weathercode[i]),pop=d.precipitation_probability_max[i]||0;
    var bigEvent='';
    if(desc==='뇌우')bigEvent='⚠️폭풍';
    else if(desc==='눈'&&d.temperature_2m_min[i]<=-5)bigEvent='⚠️폭설';
    else if(pop>=80&&desc==='비')bigEvent='⚠️폭우';
    html+='<div class="wt-cell wt-wcell'+(isT?' wt-today':'')+'">'+
      (bigEvent?'<div class="wt-alert">'+bigEvent+'</div>':'')+
      '<div class="wt-emo">'+emo(desc)+'</div>'+
      '<div class="wt-temps"><span class="wt-hi">'+Math.round(d.temperature_2m_max[i])+'°</span><span class="wt-lo">'+Math.round(d.temperature_2m_min[i])+'°</span></div>'+
      (pop>0?'<div class="wt-pop">💧'+pop+'%</div>':'')+
      '</div>'
  }
  html+='</div>';
  html+='</div></div>';
  return html
}

// ── 메인 렌더 ──
async function renderMain(){
  var area=document.getElementById('mainArea');
  area.innerHTML='<div class="sec"><div class="loading"><span class="spin"></span>불러오는 중...</div></div>';

  if(curTab==='ulju'){
    await renderUlju();
    return
  }

  if(curTab==='today'){
    try{
      var wdata=null;
      if(isKR){
        wdata=await kmaToday();
        todayWData=wdata;
      }
      var now=new Date(),tdStr=dateStr(now);
      var html='';
      // 일정
      html+='<div class="sec"><div class="slbl">📅 오늘 일정</div><div class="card">'+renderSchedList(tdStr)+'</div></div>';
      // 날씨
      if(wdata)html+=renderTodayWeather(wdata);
      // 포인트
      html+=makePoints(wdata);
      area.innerHTML=html
    }catch(e){
      area.innerHTML='<div class="sec"><div class="err">불러오기 실패: '+e.message+'</div></div>'
    }
  } else {
    var days=curTab==='week'?7:14;
    var cacheKey=curTab;
    try{
      if(!wCache[cacheKey])wCache[cacheKey]=await openMeteo(days);
      area.innerHTML=renderWeekTable(wCache[cacheKey],days)
    }catch(e){
      area.innerHTML='<div class="sec"><div class="err">불러오기 실패: '+e.message+'</div></div>'
    }
  }
}

// ── 검색 ──
function openSearch(){document.getElementById('ovl').classList.add('open');setTimeout(function(){document.getElementById('sinput').focus()},200)}
function closeSearch(){
  document.getElementById('ovl').classList.remove('open');
  document.getElementById('sinput').value='';
  document.getElementById('sclr').style.display='none';
  document.getElementById('sres').innerHTML='<div class="shint">국내외 도시명을 입력하세요</div>'
}
function ovlClick(e){if(e.target===document.getElementById('ovl'))closeSearch()}
function clrSearch(){document.getElementById('sinput').value='';document.getElementById('sclr').style.display='none';document.getElementById('sres').innerHTML='<div class="shint">국내외 도시명을 입력하세요</div>';document.getElementById('sinput').focus()}
function onSInput(){
  var q=document.getElementById('sinput').value.trim();
  document.getElementById('sclr').style.display=q?'block':'none';
  clearTimeout(stimer);
  if(!q){document.getElementById('sres').innerHTML='<div class="shint">국내외 도시명을 입력하세요</div>';return}
  stimer=setTimeout(function(){searchCity(q)},400)
}
async function searchCity(q){
  document.getElementById('sres').innerHTML='<div class="shint"><span class="spin"></span>검색 중...</div>';
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&accept-language=ko');
    var data=await r.json();
    if(!data.length){document.getElementById('sres').innerHTML='<div class="shint">결과가 없어요.</div>';return}
    var html='';
    for(var i=0;i<data.length;i++){
      var item=data[i];
      var name=item.display_name.split(',')[0];
      var sub=item.display_name.split(',').slice(1,3).join(',').trim();
      html+='<div class="ritem" onclick="pickCity('+item.lat+','+item.lon+',\''+name.replace(/'/g,"\\'")+'\')">'+'<div>'+name+'</div><div class="rsub">'+sub+'</div></div>'
    }
    document.getElementById('sres').innerHTML=html
  }catch(e){document.getElementById('sres').innerHTML='<div class="shint">검색 실패.</div>'}
}
async function pickCity(la,lo,name){
  closeSearch();
  lat=parseFloat(la);lng=parseFloat(lo);locName=name;
  var g=ll2grid(lat,lng);nx=g.nx;ny=g.ny;
  isKR=lat>=33&&lat<=38.9&&lng>=124&&lng<=132;
  document.getElementById('locname').textContent=locName;
  wCache={};
  await renderMain()
}

// ── 초기화 ──
async function init(){
  setDate();wCache={};
  document.getElementById('locname').textContent='위치 확인 중...';
  try{
    var pos=await new Promise(function(res,rej){navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000})});
    lat=pos.coords.latitude;lng=pos.coords.longitude;
    var g=ll2grid(lat,lng);nx=g.nx;ny=g.ny;
    isKR=lat>=33&&lat<=38.9&&lng>=124&&lng<=132;
    try{
      var r=await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json&accept-language=ko');
      var d=await r.json(),a=d.address;
      locName=a.city||a.county||a.town||a.village||a.suburb||'현재위치'
    }catch(e){locName='현재위치'}
  }catch(e){lat=37.4563;lng=126.7052;nx=55;ny=124;locName='인천';isKR=true}
  document.getElementById('locname').textContent=locName;

  // 저장된 Google 토큰 복원 시도
  var saved=localStorage.getItem('gcal_token');
  if(saved){
    gcalToken=saved;
    updateGcalUI(true);
    await fetchGcalEvents()
  }

  await renderMain()
}

init();
</script>
